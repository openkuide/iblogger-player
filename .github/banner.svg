<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" fill="none" role="img" aria-label="iblogger-player">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#05050a"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientTransform="translate(320 40) rotate(35) scale(560 420)">
      <stop stop-color="#0a84ff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#0a84ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientTransform="translate(1180 320) rotate(-120) scale(620 460)">
      <stop stop-color="#bf5af2" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#bf5af2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="96" y1="96" x2="224" y2="224" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7aa8ff"/>
      <stop offset="1" stop-color="#a98bff"/>
    </linearGradient>
    <linearGradient id="word" x1="300" y1="120" x2="300" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c8c8d4"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="320" rx="0" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#glowA)"/>
  <rect width="1280" height="320" fill="url(#glowB)"/>

  <!-- faint scanlines (CRT nod) -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="40" x2="1280" y2="40"/>
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
  </g>

  <!-- logo mark: play button in a film frame -->
  <g transform="translate(96 96)">
    <rect x="2" y="14" width="124" height="100" rx="26" fill="#ffffff" fill-opacity="0.04" stroke="url(#mark)" stroke-width="6"/>
    <g stroke="url(#mark)" stroke-width="5" stroke-opacity="0.5">
      <line x1="28" y1="14" x2="28" y2="114"/>
      <line x1="100" y1="14" x2="100" y2="114"/>
    </g>
    <path d="M52 44c0-4.4 4.8-7.1 8.6-4.9l28 16.7a5.7 5.7 0 0 1 0 9.8l-28 16.7c-3.8 2.2-8.6-.5-8.6-4.9V44Z" fill="url(#mark)"/>
  </g>

  <!-- wordmark -->
  <text x="262" y="172" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="76" font-weight="700" letter-spacing="-2" fill="url(#word)">iblogger</text>
  <text x="262" y="172" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="76" font-weight="500" letter-spacing="-2" fill="#8a8a98" dx="290">player</text>

  <!-- tagline -->
  <text x="264" y="218" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="500" fill="#9a9aa8">Static HLS streaming player &amp; movie catalog — no backend, GitHub Pages ready</text>

  <!-- chips -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="600" fill="#cfcfe0">
    <rect x="264" y="244" width="92"  height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="310" y="266" text-anchor="middle">HLS</text>
    <rect x="368" y="244" width="118" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="427" y="266" text-anchor="middle">hls.js</text>
    <rect x="498" y="244" width="96"  height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="546" y="266" text-anchor="middle">Plyr</text>
    <rect x="606" y="244" width="178" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="695" y="266" text-anchor="middle">GitHub Pages</text>
  </g>
</svg>
