<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" fill="none" role="img" aria-label="iblogger-player">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050508"/>
      <stop offset="1" stop-color="#0b0b14"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientTransform="translate(280 30) rotate(38) scale(600 440)">
      <stop stop-color="#0a84ff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#0a84ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientTransform="translate(1200 320) rotate(-115) scale(640 480)">
      <stop stop-color="#bf5af2" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#bf5af2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="0" cy="0" r="1" gradientTransform="translate(760 160) rotate(0) scale(360 260)">
      <stop stop-color="#30d158" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#30d158" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="98" y1="98" x2="222" y2="222" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5eacff"/>
      <stop offset="1" stop-color="#b580f8"/>
    </linearGradient>
    <linearGradient id="word" x1="262" y1="118" x2="262" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c8c8d8"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#glowA)"/>
  <rect width="1280" height="320" fill="url(#glowB)"/>
  <rect width="1280" height="320" fill="url(#glowC)"/>

  <!-- scanlines (CRT nod) -->
  <g opacity="0.035" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="40"  x2="1280" y2="40"/>
    <line x1="0" y1="80"  x2="1280" y2="80"/>
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
  </g>

  <!-- logo mark: film frame + play button -->
  <g transform="translate(82 90)">
    <rect x="2" y="14" width="126" height="102" rx="24" fill="#ffffff" fill-opacity="0.04" stroke="url(#mark)" stroke-width="5.5"/>
    <g stroke="url(#mark)" stroke-width="4.5" stroke-opacity="0.42">
      <line x1="29"  y1="14" x2="29"  y2="116"/>
      <line x1="101" y1="14" x2="101" y2="116"/>
    </g>
    <path d="M53 43c0-4.7 5.1-7.5 9-5.2l28.6 17.1a6.1 6.1 0 0 1 0 10.3L62 82.4c-3.9 2.3-9-.5-9-5.2V43Z" fill="url(#mark)"/>
  </g>

  <!-- wordmark -->
  <text x="248" y="170" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="75" font-weight="700" letter-spacing="-2.5" fill="url(#word)">iblogger</text>
  <text x="248" y="170" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="75" font-weight="400" letter-spacing="-2.5" fill="#64648a" dx="291"> player</text>

  <!-- tagline -->
  <text x="250" y="214" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="400" letter-spacing="0.08" fill="#88889a">Static HLS player &amp; bilingual movie catalog (Khmer / EN) &#x2014; no backend, GitHub Pages ready</text>

  <!-- tech stack chips -->
  <g font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="15.5" font-weight="600" fill="#c4c4d8">
    <!-- Video.js -->
    <rect x="250" y="244" width="104" height="32" rx="16" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1"/>
    <text x="302" y="265" text-anchor="middle">Video.js</text>
    <!-- Vue.js -->
    <rect x="364" y="244" width="94"  height="32" rx="16" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1"/>
    <text x="411" y="265" text-anchor="middle">Vue.js</text>
    <!-- HLS -->
    <rect x="468" y="244" width="80"  height="32" rx="16" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1"/>
    <text x="508" y="265" text-anchor="middle">HLS</text>
    <!-- GitHub Pages -->
    <rect x="558" y="244" width="166" height="32" rx="16" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1"/>
    <text x="641" y="265" text-anchor="middle">GitHub Pages</text>
  </g>
</svg>
