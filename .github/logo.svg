<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" fill="none" role="img" aria-label="iblogger player logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050508"/>
      <stop offset="1" stop-color="#0b0b14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(80 80) scale(120)">
      <stop stop-color="#0a84ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0a84ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="17" y1="17" x2="143" y2="143" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5eacff"/>
      <stop offset="1" stop-color="#b580f8"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="160" height="160" rx="24" fill="url(#bg)"/>
  <rect width="160" height="160" rx="24" fill="url(#glow)"/>

  <!-- logo mark: film frame + play button (same geometry as banner, scaled to 160×160) -->
  <g transform="translate(15 22)">
    <!-- film frame -->
    <rect x="2" y="14" width="126" height="102" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="url(#mark)" stroke-width="5"/>
    <!-- film strip lines -->
    <g stroke="url(#mark)" stroke-width="4" stroke-opacity="0.4">
      <line x1="29"  y1="14" x2="29"  y2="116"/>
      <line x1="101" y1="14" x2="101" y2="116"/>
    </g>
    <!-- play button -->
    <path d="M53 43c0-4.7 5.1-7.5 9-5.2l28.6 17.1a6.1 6.1 0 0 1 0 10.3L62 82.4c-3.9 2.3-9-.5-9-5.2V43Z" fill="url(#mark)"/>
  </g>
</svg>
