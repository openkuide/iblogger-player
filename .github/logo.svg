<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" width="120" height="120">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f"/>
      <stop offset="50%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="49" cy="60" r="38" stroke="url(#g)" stroke-width="1" fill="none" opacity="0.25"/>
  <!-- Play circle -->
  <circle cx="49" cy="60" r="32" stroke="url(#g)" stroke-width="3.5" fill="none" filter="url(#glow)"/>
  <!-- Play triangle -->
  <path d="M41 44L63 60L41 76V44Z" fill="url(#g)" filter="url(#glow)"/>
  <!-- Cursor mark (iblogger cursor brand) -->
  <path d="M20 7v76l21-19.5 16.5 32 10.5-5.5-16.5-32 24.5-.5z"
        transform="translate(64,54) scale(0.52)"
        fill="#ffffff" stroke="url(#g)" stroke-width="4.5" stroke-linejoin="round"
        filter="url(#glow)"/>
</svg>
