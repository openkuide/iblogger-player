<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="300" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#1b0f1a"/>
      <stop offset="100%" stop-color="#240a15"/>
    </linearGradient>
    <linearGradient id="swordGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255, 69, 58, 0)"/>
      <stop offset="50%" stop-color="rgba(255, 69, 58, 0.4)"/>
      <stop offset="100%" stop-color="rgba(255, 69, 58, 0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="450" fill="url(#bg)"/>

  <!-- Decorative Slashing Lines (Action Theme) -->
  <path d="M -50 350 L 350 150 L 350 155 L -50 355 Z" fill="#ff453a" opacity="0.12"/>
  <path d="M 0 100 L 300 400" stroke="#ff453a" stroke-width="1.5" opacity="0.25" stroke-dasharray="8, 6"/>
  <rect x="0" y="190" width="300" height="70" fill="url(#swordGlow)"/>

  <!-- SHORT Film Badge (Top Right) -->
  <rect x="225" y="15" width="60" height="20" rx="6" fill="#00f2fe" opacity="0.95"/>
  <text x="255" y="29" font-family="'Outfit', 'Inter', sans-serif" font-size="9" font-weight="900" fill="#0c1017" text-anchor="middle" letter-spacing="0.05em">SHORT</text>

  <!-- Title Section -->
  <text x="150" y="160" font-family="'Outfit', 'Inter', 'Kantumruy Pro', 'Khmer OS Battambang', sans-serif" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle">
    <tspan x="150" dy="0">ភរិយាខ្ញុំ</tspan>
    <tspan x="150" dy="38">មានអាថ៌កំបាំង</tspan>
  </text>
  <text x="150" y="248" font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="600" fill="#a0aec0" text-anchor="middle" opacity="0.75">My Wife Has a Secret</text>

  <!-- Year Badge (Bottom Left) -->
  <rect x="15" y="405" width="45" height="24" rx="6" fill="rgba(255, 255, 255, 0.08)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
  <text x="37.5" y="421" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">2024</text>

  <!-- Watermark (Bottom Center) -->
  <text x="150" y="421" font-family="'Outfit', 'Inter', sans-serif" font-size="9" font-weight="800" fill="#ffffff" opacity="0.2" text-anchor="middle" letter-spacing="0.2em">IBLOGGER</text>

  <!-- Rating Badge (Bottom Right) -->
  <rect x="220" y="405" width="65" height="24" rx="6" fill="rgba(255, 69, 58, 0.12)" stroke="rgba(255, 69, 58, 0.25)" stroke-width="1"/>
  <text x="252.5" y="421" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="700" fill="#ff453a" text-anchor="middle">★ 8.2</text>
</svg>
